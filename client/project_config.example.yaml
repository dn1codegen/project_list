# Пример конфигурации для отправки проекта через API

# URL сервера (измените на ваш реальный сервер)
server_url: "http://localhost:3000"

# API ключ для отправки проектов через API
# Создайте отдельный ключ для отправки через API на странице /admin/dashboard
# НЕ ИСПОЛЬЗУЙТЕ ключ для веб-доступа!
api_key: "ВАШ_API_КЛЮЧ_ДЛЯ_ОТПРАВКИ_ЗДЕСЬ"

# Данные проекта
project:
  # Артикул проекта (уникальный идентификатор для обновления)
  # При повторной отправке с тем же артикулом, проект будет обновлён
  sku: "REM-001"
  name: "Ремонт квартиры"
  customer: "Иванов Иван Иванович"
  address: "г. Москва, ул. Ленина, д. 10, кв. 25"
  description: |
    Полный ремонт двухкомнатной квартиры:
    - Замена полов на всей площади
    - Установка новой сантехники
    - Покраска стен и потолков
    - Замена электрики
    - Установка новой мебели

# Директории с файлами (скрипт автоматически загрузит все файлы)
# Можно добавлять любые папки - для каждой будет создан отдельный блок в проекте
directories:
  # Папка с замерами (изображения)
  замеры:
    path: "замеры"
    title: "Замеры помещения"
    display: "grid"

  # Папка с примерами (изображения)
  примеры:
    path: "примеры"
    title: "Примеры работ"
    display: "grid"

  # Папка с фото места размещения
  место:
    path: "место"
    title: "Место размещения"
    display: "grid"

  # Папка с правками (текстовые файлы или изображения)
  правки:
    path: "правки"
    title: "Правки и изменения"
    display: "list"

  # Папка с фурнитурой (изображения или документы)
  фурнитура:
    path: "фурнитура"
    title: "Фурнитура и комплектующие"
    display: "grid"

  # Папка с материалами (изображения или документы)
  материалы:
    path: "материалы"
    title: "Используемые материалы"
    display: "grid"

  # Папка с документами (PDF, DOC и т.д.)
  документы:
    path: "документы"
    title: "Документация"
    display: "list"

# Описание параметров папок:
# path - путь к папке относительно директории client/
# title - заголовок блока в веб-интерфейсе проекта
# display - способ отображения:
#   - "grid" - для изображений (карточки с возможностью увеличения)
#   - "list" - для документов и текстовых файлов (список ссылок)

# Особенности:
# - Картинки (JPG, PNG, GIF, WEBP) отображаются в карточках
# - Текстовые файлы (TXT, MD, LOG) отображаются как текст
# - Документы (PDF, DOC, XLS) отображаются как ссылки
# - В одной папке могут быть файлы разных типов
# - Имена файлов без расширения используются как описания
